name: Deploy Azure Web App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/web-host-readiness
    paths:
      - ".github/workflows/deploy-azure-webapp.yml"
      - "requirements.txt"
      - "startup.sh"
      - "webapp/**"
      - "docs/reference/axinom_ingest_template_v*.xlsx"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      PACKAGE_DIR: package

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python source
        run: |
          set -euo pipefail
          python -m compileall webapp

      - name: Build deployment package
        run: |
          set -euo pipefail
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR/docs/reference"
          cp -R webapp "$PACKAGE_DIR/"
          cp requirements.txt startup.sh "$PACKAGE_DIR/"
          find "$PACKAGE_DIR/webapp" -name '__pycache__' -prune -exec rm -rf {} +
          find "$PACKAGE_DIR/webapp" -name '.DS_Store' -delete
          shopt -s nullglob
          for template in docs/reference/axinom_ingest_template_v*.xlsx; do
            cp "$template" "$PACKAGE_DIR/docs/reference/"
          done

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PACKAGE_DIR }}
